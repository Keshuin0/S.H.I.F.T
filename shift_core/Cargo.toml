[package]
name = "shift_core"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
jni = "0.21.1"
tokio = { version = "1.35", features = ["full"] }
arrayvec = "0.7"
log = "0.4"
android_logger = "0.13"

# PHASE 2.1 UPGRADE: Added tcp, noise, and yamux for robust firewall fallback
libp2p = { version = "0.53", features = ["tokio", "quic", "tcp", "noise", "yamux", "gossipsub", "macros", "kad", "mdns", "autonat", "relay", "dcutr", "identify", "ping"] }

# PHASE 2.3: The Pinnacle Spatial Indexing (Uber H3)
h3o = "0.9.4"