[package]
name = "shift_core"
version = "0.1.0"
edition = "2021"

[lib]
name = "shift_core"
crate-type = ["cdylib", "rlib"]

[dependencies]
sha2 = "0.10.8" # We need this for cryptographic hashing
hex = "0.4.3"   # To encode the hashes
jni = "0.21.1"
tokio = { version = "1.35", features = ["full"] }
arrayvec = "0.7"
log = "0.4"
android_logger = "0.13"

# PHASE 2.1 UPGRADE: Added tcp, noise, and yamux for robust firewall fallback
libp2p = { version = "0.53.2", features = ["tcp", "noise", "yamux", "quic", "gossipsub", "kad", "mdns", "identify", "ping", "autonat", "dcutr", "relay", "macros", "tokio"] }

# PHASE 2.3: The Pinnacle Spatial Indexing (Uber H3)
h3o = "0.9.4"