name: "\U0001F41E Bug Report"
description: Report a bug, broken behavior, or incorrect output
title: "[Bug] "
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Thank you for reporting. Please fill in the details below.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Boot the app
        2. Tap '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Affected Files
      description: Which files/lines are involved?
      placeholder: |
        - `shift_core/src/main.rs` (lines 100-120)
        - `android_app/.../MainActivity.kt` (line 45)
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "P0: Critical — Blocks core functionality"
        - "P1: High — Major gap, fix before milestone"
        - "P2: Medium — Should fix, not blocking"
        - "P3: Low — Nice to have"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - tee-vault (Rust TEE / pKVM / SELinux)
        - zk-engine (Arkworks ZK circuits)
        - p2p-mesh (libp2p, GossipSub, DHT)
        - block-lattice (Ledger, StateBlock)
        - android-app (Kotlin UI, BLE, sensors)
        - pricing-engine (Surge, AI oracle)
        - identity (Keys, SBT, biometrics)
        - devops (CI/CD, GitHub Actions)
    validations:
      required: true
  - type: textarea
    id: fix
    attributes:
      label: Proposed Fix
      description: If you have a fix in mind, describe it here.
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List any issues this blocks or is blocked by.
      placeholder: |
        - Blocked by #XX
        - Blocks #YY
        - Related to #ZZ
